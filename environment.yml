      - statsmodels==0.12.2
      - openpyxl==3.1.3
      - pyarrow==6.0.1
      - lxml==5.4.0
      - tqdm==4.64.1
      - joblib==1.1.1
      - tabulate==0.8.10
      - ipython==7.16.3
      - ipykernel==5.5.6
