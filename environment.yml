# The Docker image remains the canonical reproducible environment,
# especially for workflows requiring commercial solvers.
name: human-cancer-kinetic-models
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.6
  - pip=21.3.1
  - setuptools=57.4.0
  - wheel=0.37.0
  - cython=0.29.24
  - c-compiler
  - cxx-compiler
  - fortran-compiler
  - pkgconfig
  - swig
  - glpk
  - gmp
  - python-flint
  - sundials=5.7
  - scikits.odes=2.6.2
  - pip:
      - Cython==3.0.12
      - numpy==1.19.5
      - scipy==1.5.4
      - pandas==1.1.5
      - h5py==3.1.0
      - matplotlib==3.3.4
      - seaborn==0.11.2
      - scikit-learn==0.24.2
      - sympy==1.3
      - networkx==2.5.1
      - cobra==0.17.0
      - swiglpk==5.0.12
      - optlang==1.6.1
      - bokeh==2.3.3
      - deap==1.4.3
      - dill==0.3.4
